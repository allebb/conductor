# Block common AI search, assistant, and training bots by User-Agent.
# Include this inside an Nginx server{} block.
if ($http_user_agent ~* "(?:GPTBot|OAI-SearchBot|ChatGPT-User|OAI-AdsBot|ClaudeBot|Claude-User|anthropic-ai|PerplexityBot|Perplexity-User|CCBot|Google-Extended|Bytespider|Amazonbot|Applebot-Extended|Meta-ExternalAgent|FacebookBot|Diffbot|YouBot)") {
    return 406;
}
