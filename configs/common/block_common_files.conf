# Block common sensitive project, source-control, dependency, and backup files.
# These requests are rejected with the Conductor WAF status code.
location = /wp-config.php {
    log_not_found off;
    return 406;
}

location ~* (^|/)readme(?:\.(?:txt|md|markdown|html?))?$ {
    log_not_found off;
    return 406;
}

location = /license.txt {
    log_not_found off;
    return 406;
}

location ~* \.(?:env|log|sql|sqlite|bak|old|orig|save|swp|dist|conf|ini)$ {
    log_not_found off;
    return 406;
}

location ~* (^|/)node_modules(?:/|$) {
    log_not_found off;
    return 406;
}

# Reject .env, .git, .gitignore, .htaccess, and other hidden paths.
# LetsEncrypt ACME challenges are handled by Conductor; other /.well-known/ paths may be served by the app.
location ~ /\.(?!well-known(?:/|$)).* {
    log_not_found off;
    return 406;
}
