# Block common SQL injection probes in the raw path and query string.
# Include this inside an Nginx server{} block.
if ($request_uri ~* "(?:union(?:%20|\+|\s|/\*.*\*/)+select|select(?:%20|\+|\s|/\*.*\*/)+(?:.+(?:%20|\+|\s|/\*.*\*/)+)?from|insert(?:%20|\+|\s|/\*.*\*/)+into|update(?:%20|\+|\s|/\*.*\*/)+.+(?:%20|\+|\s|/\*.*\*/)+set|delete(?:%20|\+|\s|/\*.*\*/)+from|drop(?:%20|\+|\s|/\*.*\*/)+(?:table|database)|information_schema|(?:benchmark|sleep|pg_sleep|load_file|extractvalue|updatexml|database|schema|version|user|concat)(?:%20|\+|\s)*\(|into(?:%20|\+|\s|/\*.*\*/)+(?:out|dump)file|waitfor(?:%20|\+|\s)+delay|xp_cmdshell|sp_executesql|(?:%27|'|%22|\")?(?:%20|\+|\s)*(?:or|and)(?:%20|\+|\s)+(?:%27|'|%22|\")?\d+(?:%27|'|%22|\")?(?:%20|\+|\s)*(?:=|%3d)(?:%20|\+|\s)*(?:%27|'|%22|\")?\d+)") {
    return 406;
}
