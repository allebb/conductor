################################################################################
# Conductor Bootstrap Config for Nginx                                         #
################################################################################

server_names_hash_bucket_size 64;

# Optional Fail2Ban security log format. Individual vhosts can enable this with:
# access_log /var/conductor/seclogs/conductor_{appname}.seclog conductor_security;
log_format conductor_security '$time_iso8601 $remote_addr $conductor_application $status "$request" "$http_user_agent"';

# Optional GeoIP2 country lookup. Requires libnginx-mod-http-geoip2 and a local
# database created with: "conductor geoipdb --update".
# Country block lists are configured per-vhost. See the commented examples inside
# this default server block and the application vhost templates.
geoip2 /var/conductor/geoip/dbip-country-lite.mmdb {
     auto_reload 5m;
     $conductor_geoip_country_code country iso_code;
}

# Shared proxy cache zone for optional proxy vhost caching. Proxy vhosts can
# enable this with: proxy_cache conductor_proxy;
proxy_cache_path /var/conductor/cache/nginx-proxy
                 levels=1:2
                 keys_zone=conductor_proxy:32m
                 max_size=1g
                 inactive=60m
                 use_temp_path=off;

# If you need to redirect all request to HTTPS, enable this block
#server {
#       listen         80;
#       listen         [::]:80;
#       server_name    {default_host_name};
#       include /etc/conductor/configs/common/wellknown.conf;
#       return         301 https://$server_name$request_uri;
#}

# Adds a default host configuration for this server.
server {

    # Comment this line if you wish to are switching to HTTPS
    listen          80 default_server;
    listen          [::]:80 default_server;

    # Default SSL virtual host for the Conductor blank page. Enable after provisioning
    # a certificate for {default_host_name}.
    #listen          443 ssl default_server;
    #listen          [::]:443 ssl default_server;
    #ssl_certificate /etc/letsencrypt/live/{default_host_name}/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/{default_host_name}/privkey.pem;
    #ssl_trusted_certificate /etc/letsencrypt/live/{default_host_name}/chain.pem;
    #include /etc/nginx/snippets/ssl-params.conf;

    server_name     _;
    server_tokens   off;
    set             $conductor_application "default";

    # Application path and index file settings.
    root            /var/www/html;
    index           index.html;

    # Additional per-application optimisations
    charset utf-8;
    client_max_body_size 32m;

    # Example GeoIP country block for this server. Enable the geoip2 lookup above,
    # then add ISO 3166-1 alpha-2 country codes to the regex.
    #
    # if ($conductor_geoip_country_code ~ ^(CN|RU)$) {
    #     return 444;
    # }
    #
    # Example GeoIP allow-list for only users from England/UK. Country-level
    # GeoIP databases return GB for the United Kingdom.
    #
    # if ($conductor_geoip_country_code !~ ^GB$) {
    #     return 444;
    # }
    #
    # Example GeoIP allow-list for users from multiple explicit countries.
    #
    # if ($conductor_geoip_country_code !~ ^(GB|US|DE)$) {
    #     return 444;
    # }

    # Enable GZip by default for common files.
    include /etc/conductor/configs/common/gzip.conf;

    # LetsEncrypt verification block
    include /etc/conductor/configs/common/wellknown.conf;

    # Local-only Nginx connection stats for dashboards and health checks.
    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow ::1;
        deny all;
        access_log off;
    }

    # Optional sensible defaults for image files etc.
    location ~* \.(png|jpg|jpeg|gif|js|css|ico)$ {
        expires 30d;
        log_not_found off;
    }

    # Deny access to .htaccess, .git and other hidden files by default.
    # LetsEncrypt ACME challenges are handled by Conductor; other /.well-known/ paths may be served by the app.
    location ~ /\.(?!well-known(?:/|$)).* {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

}

include /etc/conductor/configs/*.conf;
