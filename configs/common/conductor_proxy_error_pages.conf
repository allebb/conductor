# Serve local, branded error pages when the upstream backend is unavailable.
# The copied per-vhost page is preferred; shared pages are used as a fallback.
error_page 502 @conductor_proxy_502;
error_page 503 @conductor_proxy_503;
error_page 504 @conductor_proxy_504;

location @conductor_proxy_502 {
    internal;
    add_header Cache-Control "no-store";
    add_header X-Application-Id $conductor_application always;
    try_files /.conductor/error_pages/502.html @conductor_proxy_502_shared;
}

location @conductor_proxy_503 {
    internal;
    add_header Cache-Control "no-store";
    add_header X-Application-Id $conductor_application always;
    try_files /.conductor/error_pages/503.html @conductor_proxy_503_shared;
}

location @conductor_proxy_504 {
    internal;
    add_header Cache-Control "no-store";
    add_header X-Application-Id $conductor_application always;
    try_files /.conductor/error_pages/504.html @conductor_proxy_504_shared;
}

location @conductor_proxy_502_shared {
    internal;
    root /var/conductor/error-pages;
    add_header Cache-Control "no-store";
    add_header X-Application-Id $conductor_application always;
    try_files /502.html =502;
}

location @conductor_proxy_503_shared {
    internal;
    root /var/conductor/error-pages;
    add_header Cache-Control "no-store";
    add_header X-Application-Id $conductor_application always;
    try_files /503.html =503;
}

location @conductor_proxy_504_shared {
    internal;
    root /var/conductor/error-pages;
    add_header Cache-Control "no-store";
    add_header X-Application-Id $conductor_application always;
    try_files /504.html =504;
}
