[Definition]

# Fail2Ban webhook action for Conductor.
# The receiving endpoint gets one JSON POST when Fail2Ban bans an IP and one
# JSON POST when Fail2Ban unbans it.
# Requires curl on the server.

actionban = /etc/conductor/utils/fail2ban_webhook.sh ban "<name>" "<ip>" "<bantime>" "<F-APPLICATION>" "<url>" || true

actionunban = /etc/conductor/utils/fail2ban_webhook.sh unban "<name>" "<ip>" "" "" "<url>" || true

[Init]

url = http://127.0.0.1
