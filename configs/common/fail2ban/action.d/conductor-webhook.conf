[Definition]

# Optional Fail2Ban webhook action for Conductor.
# This file is installed but unused until a jail references conductor-webhook in
# /etc/fail2ban/jail.d/conductor-nginx.conf.
#
# The receiving endpoint will get one POST when Fail2Ban bans an IP and one POST
# when Fail2Ban unbans it.
# Requires curl on the server if you enable this action.

actionban = curl -fsS --max-time 5 -H "Content-Type: application/json" -X POST --data '{"event":"ban","jail":"<name>","ip":"<ip>","bantime":"<bantime>"}' "<url>" >/dev/null || true

actionunban = curl -fsS --max-time 5 -H "Content-Type: application/json" -X POST --data '{"event":"unban","jail":"<name>","ip":"<ip>"}' "<url>" >/dev/null || true

[Init]

# Replace this with your GUI/webhook endpoint when enabling the action in a jail.
url = https://example.com/fail2ban-webhook
