[conductor-manual]
enabled  = true
filter   = conductor-manual
logpath  = /var/log/conductor-fail2ban-manual.log
backend  = polling
bantime  = -1
action   = nftables-multiport[name=conductor-manual, port="http,https", protocol=tcp]
# Webhook example: uncomment this action block and set url to POST ban/unban events.
# action   = nftables-multiport[name=conductor-manual, port="http,https", protocol=tcp]
#            conductor-webhook[name=conductor-manual, url="https://example.com/fail2ban-webhook"]

[conductor-nginx-scanner]
enabled  = true
filter   = conductor-nginx-scanner
logpath  = /tmp/conductor_*.seclog
backend  = polling
findtime = 10m
maxretry = 5
bantime  = 1h
action   = nftables-multiport[name=conductor-scanner, port="http,https", protocol=tcp]
# Webhook example: uncomment this action block and set url to POST ban/unban events.
# action   = nftables-multiport[name=conductor-scanner, port="http,https", protocol=tcp]
#            conductor-webhook[name=conductor-scanner, url="https://example.com/fail2ban-webhook"]

