[conductor-manual]
enabled  = true
filter   = conductor-manual
logpath  = /var/log/conductor-fail2ban-manual.log
backend  = polling
bantime  = -1
action   = iptables-multiport[name=conductor-manual, port="http,https", protocol=tcp]

[conductor-nginx-scanner]
enabled  = true
filter   = conductor-nginx-scanner
logpath  = /tmp/conductor_*.seclog
backend  = polling
findtime = 10m
maxretry = 5
bantime  = 1h
action   = iptables-multiport[name=conductor-scanner, port="http,https", protocol=tcp]

[conductor-nginx-4xx]
enabled  = true
filter   = conductor-nginx-4xx
logpath  = /tmp/conductor_*.seclog
backend  = polling
findtime = 10m
maxretry = 80
bantime  = 30m
action   = iptables-multiport[name=conductor-4xx, port="http,https", protocol=tcp]

[conductor-nginx-rate]
enabled  = true
filter   = conductor-nginx-rate
logpath  = /tmp/conductor_*.seclog
backend  = polling
findtime = 1m
maxretry = 600
bantime  = 24h
action   = iptables-multiport[name=conductor-rate, port="http,https", protocol=tcp]
