# Block common path traversal and local file inclusion probes.
# Include this inside an Nginx server{} block.
if ($request_uri ~* "(?:\.\./|\.\.\\\\|%2e%2e(?:%2f|/|%5c|\\\\)|%252e%252e(?:%252f|%255c)|(?:^|[?&][^=]*=)(?:/|%2f|%252f)(?:etc/passwd|etc/shadow|proc/self/environ|proc/version|proc/cmdline|windows/win\.ini|boot\.ini|var/log|var/www|usr/local|home/|root/)|(?:^|[?&][^=]*=)(?:\.\/|%2e%2f|%252e%252f))") {
    return 406;
}
