# Mozilla "Intermediate" TLS configuration - see https://ssl-config.mozilla.org/
# (generated for nginx, supports clients back to ~2018: Firefox 27+, Chrome 31+, Android 5.0+ etc.)

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_ecdh_curve X25519:prime256v1:secp384r1;
ssl_session_cache shared:SSL:10m;
ssl_session_tickets off;

# OCSP stapling - only enable this if your nginx build actually supports it!
# If nginx logs "ssl_stapling ignored, no OCSP stapling support" on restart/reload,
# your nginx binary was built against an OpenSSL/LibreSSL that lacks OCSP stapling
# support (common on some FreeBSD/older or minimal nginx builds) - leave these
# commented out in that case, there is no config-side fix for it.
#ssl_stapling on;
#ssl_stapling_verify on;
#resolver 8.8.8.8 8.8.4.4 valid=300s;
#resolver_timeout 5s;

# Disable preloading HSTS for now.  You can use the commented out header line that includes
# the "preload" directive if you understand the implications.
#add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";
#add_header Strict-Transport-Security "max-age=63072000; includeSubdomains";
#add_header X-Frame-Options DENY;
#add_header X-Content-Type-Options nosniff;

ssl_dhparam /etc/ssl/certs/dhparam.pem;
